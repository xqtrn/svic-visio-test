name: visio
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm init -y >/dev/null && npm i playwright@1.49.0 >/dev/null
      - run: npx playwright install --with-deps chrome
      - name: probe video from runner
        run: |
          curl -s -o /dev/null -w 'mp4 no-range: %{http_code} %{size_download}b\n' -H 'Cookie: svic_token=edge-preview' https://test3.siliconvalleyinvestclub.com/svic-video/PkL-NfnsxDk.mp4
          curl -s -D - -o /dev/null -H 'Cookie: svic_token=edge-preview' -H 'Range: bytes=0-1' https://test3.siliconvalleyinvestclub.com/svic-video/PkL-NfnsxDk.mp4 | head -6
      - run: node visio.js
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: visio-out, path: out/ }
