name: downscale-clips
# одноразовый бэкфилл (Артур 2026-07-16 «видео зависает»): все клипы релиза >1080p
# перекодируются в 1080p (тяжёлый 4K-декод + голодание полосы = зависания карточек)
on:
  workflow_dispatch: {}
permissions: { contents: write }
jobs:
  downscale:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: tools
        run: sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
      - name: transcode oversized
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release view clips -R "$GITHUB_REPOSITORY" --json assets --jq '.assets[] | select(.name|endswith(".mp4")) | .name' > list.txt
          OK=0; SKIP=0
          while read -r F <&3; do
            rm -f in.mp4 out.mp4
            gh release download clips -R "$GITHUB_REPOSITORY" -p "$F" -O in.mp4 2>/dev/null || { echo "dl fail $F"; continue; }
            H=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 in.mp4 | head -1)
            if [ -z "$H" ] || [ "$H" -le 1080 ]; then SKIP=$((SKIP+1)); continue; fi
            echo "=== $F: ${H}p → 1080p"
            ffmpeg -nostdin -hide_banner -loglevel error -i in.mp4 -vf scale=-2:1080 -c:v libx264 -preset veryfast -crf 23 -c:a aac -movflags +faststart out.mp4 || continue
            mv out.mp4 "$F"
            gh release upload clips "$F" -R "$GITHUB_REPOSITORY" --clobber && OK=$((OK+1))
            rm -f "$F"
          done 3< list.txt
          echo "=== transcoded=$OK skipped(<=1080p)=$SKIP ==="
