name: dsshot
on: workflow_dispatch
jobs:
  shot:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm init -y >/dev/null && npm i playwright@1.49.0 >/dev/null
      - run: npx playwright install --with-deps chrome webkit
      - run: node ds-shot.js
      - run: timeout 120 node arx-shot.js || echo ARX_EXIT=$?
      - run: timeout 120 node home-shot.js || echo HOME_EXIT=$?
      - run: timeout 120 node vid-shot.js || echo VID_EXIT=$?
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: ds-out, path: out/ }
