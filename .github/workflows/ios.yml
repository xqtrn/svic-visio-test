name: ios
on: workflow_dispatch
jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm init -y >/dev/null && npm i playwright@1.49.0 >/dev/null
      - run: npx playwright install --with-deps webkit
      - run: sudo apt-get install -y gstreamer1.0-libav gstreamer1.0-plugins-good gstreamer1.0-plugins-bad >/dev/null 2>&1 || true
      - run: node ios.js
      - uses: actions/upload-artifact@v4
        if: always()
        with: { name: ios-out, path: out/ }
