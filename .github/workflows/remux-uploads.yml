name: remux-uploads
# Аплоады видео из админки test-стенда → lossless faststart-ремукс (iPhone
# стартует мгновенно). Ежечасно; пустой прогон занимает секунды.
on:
  schedule:
    - cron: '25 * * * *'
  workflow_dispatch:
jobs:
  remux:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm init -y >/dev/null 2>&1 && npm i pg >/dev/null 2>&1
      - run: node remux-uploads.mjs
        env:
          DATABASE_URL: ${{ secrets.SVIC_PLATFORM_DATABASE_URL }}
          S3_ACCESS_KEY_ID: ${{ secrets.S3_VIDEO_ACCESS_KEY_ID }}
          S3_SECRET_ACCESS_KEY: ${{ secrets.S3_VIDEO_SECRET_ACCESS_KEY }}
          S3_REGION: us-east-1
          S3_BUCKET: svic-video-archive
