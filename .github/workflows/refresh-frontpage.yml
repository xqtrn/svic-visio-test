name: refresh-frontpage
on:
  schedule:
    - cron: '17 13 * * *'   # daily 13:17 UTC (~06:17 PST)
  workflow_dispatch:
permissions:
  contents: write   # release upload (tv.json / covers.json)
jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm init -y >/dev/null 2>&1 && npm i pg >/dev/null 2>&1
      - run: node refresh-frontpage.js
        env:
          DATABASE_URL: ${{ secrets.SVIC_PLATFORM_DATABASE_URL }}
      # манифесты эфира и ховер-обложек — ежедневно, автономно (Артур 2026-07-12:
      # Moonshot-класс — клип есть, статичный манифест не знал; раньше tv.json обновлялся вручную)
      - name: rebuild tv.json + covers.json
        run: |
          node tv-manifest.js
          gh release upload clips tv.json covers.json -R "$GITHUB_REPOSITORY" --clobber
        env:
          GH_TOKEN: ${{ github.token }}
