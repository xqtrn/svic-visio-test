name: events
on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * 1'   # еженедельно, понедельник 06:00 PT (Артур 2026-07-12: раз в неделю достаточно)
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: npm init -y >/dev/null 2>&1 && npm i pg >/dev/null 2>&1
      - run: node events-scan.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
          # SOT = site_blocks.events в БД стенда (админка); демон добавляет туда же
          DATABASE_URL: ${{ secrets.SVIC_PLATFORM_DATABASE_URL }}
