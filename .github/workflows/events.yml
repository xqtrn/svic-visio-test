name: events
on:
  workflow_dispatch:
  schedule:
    - cron: '0 13 * * *'   # ежедневно 06:00 PT: новые top-tier мероприятия — сами, без людей
permissions:
  contents: write
jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - run: node events-scan.mjs
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
