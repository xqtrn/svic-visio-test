name: convert-clips
on:
  workflow_dispatch: {}
  schedule:
    - cron: '17 6 * * *'   # ежедневно 06:17 UTC — новые статьи получают самохостинг-ролик за часы, не за неделю (Артур 2026-07-16: «почему без видео»)
permissions: { contents: write }
jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: tools
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          python3 -m pip install --quiet --upgrade yt-dlp
      - name: discover missing article videos
        env: { GH_TOKEN: "${{ github.token }}" }
        run: node weekly-sync.js
      - name: download (wordpress / youtube via Penguin) + faststart + upload
        env:
          GH_TOKEN: ${{ github.token }}
          PENGUIN_SOCKS: ${{ secrets.PENGUIN_SOCKS }}
        run: |
          gh release view clips -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || gh release create clips -R "$GITHUB_REPOSITORY" -t "progressive clips" -n "article cover/interview videos"
          N=$(node -e "console.log(require('./manifest-missing.json').length)")
          echo "missing=$N"; OK=0; FAIL=0
          for i in $(seq 0 $((N-1))); do
            KEY=$(node -e "console.log(require('./manifest-missing.json')[$i].key)")
            TYPE=$(node -e "console.log(require('./manifest-missing.json')[$i].type)")
            SRC=$(node -e "console.log(require('./manifest-missing.json')[$i].source)")
            OLD=$(node -e "console.log(require('./manifest-missing.json')[$i].old||0)")
            echo "=== $KEY ($TYPE) ==="; rm -f in.mp4 "$KEY.mp4"
            if [ "$TYPE" = wordpress ]; then curl -sL "$SRC" -o in.mp4
            else
              DUR=$(yt-dlp --no-warnings --skip-download --print duration --proxy "$PENGUIN_SOCKS" --extractor-args "youtube:player_client=ios,android,web_safari" "$SRC" 2>/dev/null | head -1)
              PREVIEW=""
              [ "$OLD" = "1" ] && PREVIEW=1   # старым карточкам хватает 24s ховер-превью
              if [ -n "$DUR" ] && [ "${DUR%.*}" -gt 120 ]; then
                # интервью: полный ролик остаётся на YouTube (канон 2026-07-10), но карточкам
                # нужен ховер/обложка → самохостим 24s ПРЕВЬЮ. --download-sections не годится:
                # его резка идёт через ffmpeg, который качает googlevideo МИМО прокси → 403;
                # качаем целиком через прокси, режем локально (-t 24) на faststart-этапе.
                echo "interview (${DUR}s > 120) → 24s preview self-host; full stays on YouTube"
                node -e "const fs=require('fs');let a=[];try{a=JSON.parse(fs.readFileSync('interview-vids.json','utf8'))}catch{};if(!a.includes('$KEY'))a.push('$KEY');fs.writeFileSync('interview-vids.json',JSON.stringify(a))"
                gh release upload clips interview-vids.json -R "$GITHUB_REPOSITORY" --clobber || true
                PREVIEW=1
              fi
              yt-dlp --no-playlist --no-progress --no-warnings --proxy "$PENGUIN_SOCKS" \
              --extractor-args "youtube:player_client=ios,android,web_safari" \
              -f 'bv*[height<=1080][ext=mp4]+ba[ext=m4a]/bv*[height<=1080]+ba/b[height<=1080][ext=mp4]/b[ext=mp4]/b' --merge-output-format mp4 -o in.mp4 "$SRC" || { FAIL=$((FAIL+1)); continue; }
            fi
            SZ=$(stat -c%s in.mp4 2>/dev/null || echo 0); [ "$SZ" -lt 50000 ] && { echo "too small"; FAIL=$((FAIL+1)); continue; }
            # карточные клипы всегда <=1080p: 4K-исходники (fallback /b в yt-dlp) давали
            # 24-62MB — тяжёлый декод + голодание полосы на прогреве = зависания (Артур 2026-07-16)
            H=$(ffprobe -v error -select_streams v:0 -show_entries stream=height -of csv=p=0 in.mp4 2>/dev/null | head -1)
            if [ -n "$PREVIEW" ]; then
              ffmpeg -hide_banner -loglevel error -ss 0 -t 24 -i in.mp4 -vf "scale=-2:min(1080\,ih)" -c:v libx264 -preset veryfast -crf 23 -c:a aac -movflags +faststart "$KEY.mp4"
            elif [ -n "$H" ] && [ "$H" -gt 1080 ]; then
              ffmpeg -hide_banner -loglevel error -i in.mp4 -vf scale=-2:1080 -c:v libx264 -preset veryfast -crf 23 -c:a aac -movflags +faststart "$KEY.mp4"
            else
              ffmpeg -hide_banner -loglevel error -i in.mp4 -c copy -movflags +faststart "$KEY.mp4" 2>/dev/null \
                || ffmpeg -hide_banner -loglevel error -i in.mp4 -c:v libx264 -preset veryfast -crf 23 -c:a aac -movflags +faststart "$KEY.mp4"
            fi
            gh release upload clips "$KEY.mp4" -R "$GITHUB_REPOSITORY" --clobber && OK=$((OK+1))
          done
          gh release upload clips cover-slugs.json -R "$GITHUB_REPOSITORY" --clobber || true
          echo "=== self-hosted=$OK failed=$FAIL of $N ==="
      - name: persist cover-slugs manifest
        run: |
          git config user.email noreply@anthropic.com; git config user.name claude
          git add cover-slugs.json && git commit -m "weekly-sync: update cover-slugs" || echo "no manifest change"
          git push || true
