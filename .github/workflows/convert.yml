name: convert-clips
on:
  workflow_dispatch:
  schedule:
    - cron: '17 6 * * 1'   # weekly: pick up newly published clips automatically
permissions:
  contents: write
jobs:
  convert:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - name: map article vids → native wordpress.com videos (no YouTube)
        run: node scan-clips.js
      - name: transfer missing clips (download wordpress mp4 → faststart remux → release)
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq ffmpeg
          gh release view clips -R "$GITHUB_REPOSITORY" >/dev/null 2>&1 || gh release create clips -R "$GITHUB_REPOSITORY" -t "progressive clips" -n "faststart remuxes of article cover videos (iOS can't stream fragmented mp4)"
          EXISTING=$(gh release view clips -R "$GITHUB_REPOSITORY" --json assets -q '.assets[].name' || true)
          CONVERTED=0; SKIP=0; FAIL=0
          COUNT=$(node -e "console.log(require('./pairs.json').length)")
          for i in $(seq 0 $((COUNT-1))); do
            VID=$(node -e "console.log(require('./pairs.json')[$i].vid)")
            URL=$(node -e "console.log(require('./pairs.json')[$i].url)")
            if echo "$EXISTING" | grep -qx "$VID.mp4"; then echo "skip $VID (exists)"; SKIP=$((SKIP+1)); continue; fi
            echo "transfer $VID ← $URL"
            curl -sL "$URL" -o in.mp4
            SIZE=$(stat -c%s in.mp4 2>/dev/null || echo 0); [ "$SIZE" -lt 100000 ] && { echo "  too small ($SIZE), skip"; FAIL=$((FAIL+1)); continue; }
            ffmpeg -hide_banner -loglevel error -i in.mp4 -c copy -movflags +faststart "$VID.mp4" || { echo "  ffmpeg fail"; FAIL=$((FAIL+1)); continue; }
            gh release upload clips "$VID.mp4" -R "$GITHUB_REPOSITORY" --clobber && CONVERTED=$((CONVERTED+1))
            rm -f in.mp4 "$VID.mp4"
          done
          echo "=== transferred=$CONVERTED skipped=$SKIP failed=$FAIL of $COUNT mapped ==="
